services:
  db:
    image: postgres:16-alpine
    container_name: mehmetcanwt-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1597532486
      - POSTGRES_DB=mehmetcanwt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mehmetcanwt"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mehmetcanwt

  redis:
    image: redis:alpine
    container_name: mehmetcanwt-redis
    restart: always
    networks:
      - mehmetcanwt

  migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mehmetcanwt-migration
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:1597532486@db:5432/mehmetcanwt?schema=public
    working_dir: /app/packages/db
    command: ["bun", "run", "push"]
    networks:
      - mehmetcanwt

  mehmetcanwt:
    container_name: mehmetcanwt
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=postgresql://postgres:1597532486@db:5432/mehmetcanwt?schema=public
      - REDIS_URL=redis://redis:6379
      - WEB_KEY=${WEB_KEY}
      - LANYARD_API_KEY=${LANYARD_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - STEAM_ID=${STEAM_ID}
      - DISCORD_ID=${DISCORD_ID}
      - NODE_ENV=production
    networks:
      - mehmetcanwt

networks:
  mehmetcanwt:
    external: true

volumes:
  pgdata:
