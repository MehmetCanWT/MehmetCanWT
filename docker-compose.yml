services:
  migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mehmetcanwt-migration
    extra_hosts:
      - "db_host:host-gateway"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    working_dir: /app/packages/db
    command: ["bun", "run", "push"]
    networks:
      - proxy_net

  mehmetcanwt:
    container_name: mehmetcanwt
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    extra_hosts:
      - "db_host:host-gateway"
    depends_on:
      migration:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - WEB_KEY=${WEB_KEY}
      - LANYARD_API_KEY=${LANYARD_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - STEAM_ID=${STEAM_ID}
      - DISCORD_ID=${DISCORD_ID}
      - NODE_ENV=production
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
