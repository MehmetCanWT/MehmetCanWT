name: Deploy to VDS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VDS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          script: |
            cd /root/stacks/MehmetCanWT
            git fetch origin main
            git reset --hard origin/main
            if [ -f "docker-compose.yml" ]; then
              docker compose up -d --build
              # Check if the main service is running
              if docker compose ps --services --filter "status=running" | grep -Fxq "mehmetcanwt"; then
                echo "Deployment successful! Pruning unused images..."
                docker image prune -f
              else
                echo "ERROR: Main container (mehmetcanwt) is not running!"
                echo "=== Migration Container Logs ==="
                docker compose logs --tail=100 migration
                echo "=== Main Container Logs ==="
                docker compose logs --tail=100 mehmetcanwt
                exit 1
              fi
            else
              echo "Hata: Klasorde docker-compose.yml bulunamadi!"
              exit 1
            fi
