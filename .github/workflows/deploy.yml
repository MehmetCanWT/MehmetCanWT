name: Deploy to VDS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VDS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          script: |
            cd /root/stacks/MehmetCanWT
            git pull origin main
            if [ -f "docker-compose.yml" ]; then
              docker compose down
              docker compose up -d --build
              # Only prune if deploy was successful
              if docker compose ps --filter "status=running" | grep -q "mehmetcanwt"; then
                docker image prune -f
              else
                echo "WARNING: Main container not running, skipping prune"
                docker compose logs --tail=50
              fi
            else
              echo "Hata: Klasorde docker-compose.yml bulunamadi!"
              exit 1
            fi
